name: CI-Environment-Sync

on:
  workflow_dispatch:

jobs:
  environment-provisioning:
    runs-on: windows-latest
    timeout-minutes: 352 

    steps:
      - name: Initialize System Diagnostics
        run: |
          Get-CimInstance Win32_OperatingSystem | Select-Object Caption, Version, FreePhysicalMemory

      - name: Advanced Network Performance Tuning
        run: |
          # Otimização de MTU para evitar fragmentação no túnel Mesh
          netsh interface ipv4 set subinterface "Ethernet" mtu=1450 store=persistent
          
          # Desativa algoritmos que causam buffering (Nagle's Algorithm)
          $tcpath = "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters\Interfaces"
          Get-ChildItem $tcpath | ForEach-Object {
              Set-ItemProperty -Path $_.PSPath -Name "TcpAckFrequency" -Value 1 -ErrorAction SilentlyContinue
              Set-ItemProperty -Path $_.PSPath -Name "TCPNoDelay" -Value 1 -ErrorAction SilentlyContinue
          }

          # Força o transporte a ignorar perdas leves de pacotes para manter fluidez
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "SelectNetworkDetect" -Value 1 -Force
          
          # Performance de renderização (Desativa suavização de fontes e temas que pesam no tráfego)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "VisualEffects" -Value 0 -Force

      - name: Configure Service Port
        run: |
          $p = "33890"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "PortNumber" -Value $p -Force
          # Prioridade máxima no Firewall
          netsh advfirewall firewall add rule name="Svc-In-TCP" dir=in action=allow protocol=TCP localport=$p profile=any
          netsh advfirewall firewall add rule name="Svc-In-UDP" dir=in action=allow protocol=UDP localport=$p profile=any
          Restart-Service -Name TermService -Force

      - name: Setup Service Account
        run: |
          $u = '${{ secrets.R_USER }}'
          $p = '${{ secrets.R_PASS }}'
          $sp = ConvertTo-SecureString $p -AsPlainText -Force
          New-LocalUser -Name $u -Password $sp -AccountNeverExpires -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member $u -ErrorAction SilentlyContinue

      - name: Deploy High-Speed Mesh
        run: |
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $dest = "$env:TEMP\node-pkg.msi"
          Invoke-WebRequest -Uri $url -OutFile $dest
          Start-Process msiexec.exe -ArgumentList "/i", "`"$dest`"", "/quiet", "/norestart" -Wait

      - name: Establish Low-Latency Link
        run: |
          # Força o uso de caminhos diretos (DERP bypass se possível)
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TS_KEY }} --hostname=${{ secrets.TS_HOST }} --accept-routes --snat-subnet-routes=false
          $addr = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          echo "NODE_ADDR=$addr" >> $env:GITHUB_ENV
      
      - name: Environment Keep-Alive
        run: |
          Write-Host "Endpoint: $env:NODE_ADDR : 33890"
          while ($true) {
              Get-Process | Sort-Object CPU -Descending | Select-Object -First 3
              Start-Sleep -Seconds 300
          }
